<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bookiverse</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <!-- Custom CSS -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>

  <body>
    <header class="site-header">
      <nav class="navbar navbar-expand-md container">
        <a class="brand-logo navbar-brand" href="{{ url_for('home') }}">
          Bookiverse
        </a>

        <button
          class="navbar-toggler custom-navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#bookiverseNavbar"
          aria-controls="bookiverseNavbar"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="bookiverseNavbar">
          <div class="navbar-nav nav-links ms-md-auto">
            <a class="nav-link" href="{{ url_for('home') }}">Home</a>
            <a class="nav-link" href="{{ url_for('books_page') }}">Books</a>
            <a class="nav-link" href="{{ url_for('reading_list_page') }}">
              Reading List
            </a>
            <a class="nav-link" href="{{ url_for('search') }}">Search</a>
            <a class="nav-link" href="{{ url_for('contact') }}">
              Request a Book
            </a>
          </div>
        </div>
      </nav>
    </header>

    <main class="container page-shell">{% block content %}{% endblock %}</main>

    <!-- Bootstrap JS bundle required for mobile hamburger menu -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
