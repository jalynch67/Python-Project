<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Bookiverse{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <!-- Custom CSS -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='css/style.css') }}"
    />
  </head>

  <body>
    <a class="skip-link" href="#main-content">Skip to main content</a>

    <header class="site-header">
      <nav
        class="navbar navbar-expand-md container"
        aria-label="Primary navigation"
      >
        <a
          class="brand-logo navbar-brand"
          href="{{ url_for('home') }}"
          aria-label="Bookiverse home"
        >
          Bookiverse
        </a>

        <button
          class="navbar-toggler custom-navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#bookiverseNavbar"
          aria-controls="bookiverseNavbar"
          aria-expanded="false"
          aria-label="Open navigation menu"
        >
          <span class="navbar-toggler-icon" aria-hidden="true"></span>
        </button>

        <div class="collapse navbar-collapse" id="bookiverseNavbar">
          <div class="navbar-nav nav-links ms-md-auto">
            <a class="nav-link" href="{{ url_for('home') }}">Home</a>

            <a class="nav-link" href="{{ url_for('books_page') }}">Books</a>

            <a class="nav-link" href="{{ url_for('reading_list_page') }}">
              Reading List
            </a>

            <a class="nav-link" href="{{ url_for('search') }}">Search</a>

            <a class="nav-link" href="{{ url_for('contact') }}">
              Request a Book
            </a>
          </div>
        </div>
      </nav>
    </header>

    <main id="main-content" class="container page-shell" tabindex="-1">
      {% block content %}{% endblock %}
    </main>

    <footer class="site-footer" aria-label="Site footer">
      <div class="container footer-inner">
        <div class="footer-brand">
          <span class="footer-logo">Bookiverse</span>
          <p>
            A fantasy reading companion for discovering books and tracking your
            reading journey.
          </p>
          <p class="footer-copyright">
            &copy; 2026 Bookiverse. All rights reserved.
          </p>
        </div>

        <a class="footer-top-link" href="#main-content"> Back to top </a>
      </div>
    </footer>

    <!-- Bootstrap JS bundle required for mobile hamburger menu -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
