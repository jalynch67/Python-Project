<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bookiverse</title>

    <!-- Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />

    <!-- Custom CSS -->
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>

  <body>
    <header class="site-header">
      <nav
        class="container d-flex flex-column flex-md-row align-items-md-center justify-content-between gap-3"
      >
        <a class="brand-logo" href="{{ url_for('home') }}">Bookiverse</a>

        <div class="nav-links">
          <a href="{{ url_for('home') }}">Home</a>
          <a href="{{ url_for('books_page') }}">Books</a>
          <a href="{{ url_for('reading_list_page') }}">Reading List</a>
          <a href="{{ url_for('search') }}">Search</a>
          <a href="{{ url_for('contact') }}">Request a Book</a>
        </div>
      </nav>
    </header>

    <main class="container page-shell">
      {% with messages = get_flashed_messages() %} {% if messages %}
      <div class="flash-messages">
        {% for message in messages %}
        <div class="alert alert-success mb-2" role="alert">{{ message }}</div>
        {% endfor %}
      </div>
      {% endif %} {% endwith %} {% block content %}{% endblock %}
    </main>
  </body>
</html>
