{% extends "base.html" %}

{% block content %}

<h2>Search Books</h2>

<form method="POST">

    <label>Book Title</label>

    <input type="text" name="search">

    <button type="submit">
        Search
    </button>

</form>

<hr>

{% if results %}

<h3>Results</h3>

<ul>

    {% for book in results %}

    <li>{{ book.title }}</li>

    {% endfor %}

</ul>

{% endif %}

{% endblock %}
